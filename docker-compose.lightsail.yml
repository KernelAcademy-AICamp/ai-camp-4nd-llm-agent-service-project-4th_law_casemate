# Lightsail 배포용 Docker Compose
# Caddy (HTTPS) + FastAPI + Qdrant
# 프론트엔드는 Vercel에서 별도 배포

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - .env.prod
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - USE_RERANKING=false
    depends_on:
      qdrant:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  qdrant:
    image: qdrant/qdrant:v1.13.2
    expose:
      - "6333"
    volumes:
      - ./qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    # 메모리 제한 (Lightsail 2GB 인스턴스 기준)
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  caddy_data:
  caddy_config:
